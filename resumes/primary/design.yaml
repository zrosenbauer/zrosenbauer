design:
  theme: engineeringresumes
  page:
    size: us-letter
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.7in
    right_margin: 0.7in
    show_footer: false
    show_top_note: true
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgba(40, 32, 32, 1)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    line_spacing: 0.78em
    alignment: left
    date_and_location_column_alignment: right
    font_family:
      body: Geist
      name: Geist
      headline: Geist
      connections: Geist
      section_titles: Geist Mono
    font_size:
      body: 9.5pt
      name: 22pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.2em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: false
      headline: false
      connections: false
      section_titles: true
  links:
    underline: true
    show_external_link_icon: false
  header:
    alignment: center
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.7cm
    space_below_headline: 0.7cm
    space_below_connections: 0.7cm
    connections:
      phone_number_format: national
      hyperlink: true
      show_icons: false
      display_urls_instead_of_usernames: true
      separator: '|'
      space_between_connections: 0.5cm
  section_titles:
    type: with_full_line
    line_thickness: 0.5pt
    space_above: 0.35cm
    space_below: 0.2cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.28cm
    space_between_text_based_entries: 0.1cm
    show_time_spans_in: []
  entries:
    date_and_location_width: 4.6cm
    side_space: 0cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: false
    degree_width: 1cm
    summary:
      space_above: 0.05cm
      space_left: 0cm
    highlights:
      bullet: ●
      nested_bullet: ■
      space_left: 0cm
      space_above: 0.05cm
      space_between_items: 0.05cm
      space_between_bullet_and_text: 0.3em
  templates:
    footer: 'NAME | PAGE_NUMBER/TOTAL_PAGES'
    top_note: 'LAST_UPDATED CURRENT_DATE'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE to END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**
        *DEGREE_WITH_AREA* — LOCATION
        SUMMARY
        HIGHLIGHTS
      degree_column:
      date_and_location_column: DATE
    normal_entry:
      main_column: |-
        **NAME**
        *LOCATION*
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    experience_entry:
      main_column: |-
        **POSITION**
        *COMPANY* — LOCATION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE